name: Links

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * *" # Daily at 06:00 UTC — catches rotted external links
  workflow_dispatch: # manual trigger for the external-link sweep

permissions:
  contents: read

jobs:
  # Blocking: broken internal links are a content bug we can always fix.
  # Crawls the built site served locally so directory URLs (/spec/x/) resolve
  # to their index.html exactly as in production. External links are skipped.
  internal:
    name: Internal links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Check internal links
        run: |
          npx astro preview --port 4321 &
          up=
          for i in $(seq 1 30); do
            curl -sf http://localhost:4321/ >/dev/null && { up=1; break; }
            sleep 1
          done
          [ -n "$up" ] || { echo "::error::preview server did not start"; exit 1; }
          # linkinator@6's CLI runs `await main()` at the top level; on newer Node
          # the event loop can empty while that await is still pending, aborting the
          # crawl with exit 13 ("unsettled top-level await") after fetching only /.
          # That's a tooling crash, not a broken link — real breakage exits 1. Pin
          # the exact version so an upstream 6.x patch can't shift the behaviour, and
          # retry *only* on the exit-13 crash, never on a genuine finding. See #58.
          attempt=1
          max=3
          while :; do
            set +e
            npx --yes linkinator@6.3.0 http://localhost:4321 \
              --recurse --skip "^https?://(?!localhost)"
            code=$?
            set -e
            [ "$code" -eq 0 ] && break
            if [ "$code" -eq 13 ] && [ "$attempt" -lt "$max" ]; then
              echo "::warning::linkinator crashed with exit 13 (unsettled top-level await); retrying ($attempt/$max)"
              attempt=$((attempt + 1))
              continue
            fi
            exit "$code"
          done

  # Blocking: runs daily and on demand. A failed run signals rotted external
  # links that need fixing. Kept off PRs so a flaky upstream (IETF / W3C / MDN
  # rate-limiting, upstream outages) can't block merges — only the daily sweep.
  #
  # Noise control lives in linkinator.config.json:
  #   - retry / retryErrors: re-attempt 429s (honouring retry-after) and 5xx,
  #     so transient rate-limits and blips don't fail the run.
  #   - concurrency 25: gentler crawl, fewer self-inflicted 429s.
  #   - skip[]: hosts that hard-block any headless checker and can never pass —
  #     w3.org/validator.w3.org/securityheaders.com sit behind a Cloudflare JS
  #     challenge (403 "Just a moment…"); developers.facebook.com 400s bots;
  #     github.com web requests are persistently 429'd from the shared GitHub
  #     Actions runner IP regardless of validity, so the whole host is skipped —
  #     verify github citations by hand when adding them; the a2a endpoint is
  #     POST-only (405);
  #     developer.android.com connection-resets headless clients ([0]); and
  #     example.com is the reserved illustration domain used in prose samples.
  #     These are excluded so a red run means real rot, not bot-blocking. Genuine
  #     404s on these hosts won't be auto-caught — verify them by hand when citing.
  external:
    name: External links
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    # Safety net: a single upstream returning a large retry-after can stall
    # linkinator's --retry. Bound the whole job so it fails fast rather than hang.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Check all links (internal + external)
        run: |
          npx astro preview --port 4321 &
          up=
          for i in $(seq 1 30); do
            curl -sf http://localhost:4321/ >/dev/null && { up=1; break; }
            sleep 1
          done
          [ -n "$up" ] || { echo "::error::preview server did not start"; exit 1; }
          # Same exit-13 foot-gun as the internal job (see #58): pin the exact
          # version and retry only on the top-level-await crash, not on real rot.
          attempt=1
          max=3
          while :; do
            set +e
            npx --yes linkinator@6.3.0 http://localhost:4321 \
              --config linkinator.config.json
            code=$?
            set -e
            [ "$code" -eq 0 ] && break
            if [ "$code" -eq 13 ] && [ "$attempt" -lt "$max" ]; then
              echo "::warning::linkinator crashed with exit 13 (unsettled top-level await); retrying ($attempt/$max)"
              attempt=$((attempt + 1))
              continue
            fi
            exit "$code"
          done
